# PARE worker registry. Each entry maps to an agent_core WorkerSpec.
# Format: workers.<name>.{endpoint | command+args, transport, risk_default, capability_tags?, kind?}
#
# stdio workers (a process PARE launches and talks to over stdin/stdout) are
# declared with `command` + `args` instead of `endpoint` — e.g. the in-house
# Python Frida MCP server. risk_default sets the HITL tier: low/medium
# auto-execute (audited); high needs operator approval; critical needs approval
# + justification. See the README "Workers & risk gating" section.
#
# NOTE (2026-05-30): the 8 apk_re_agents Streamable-HTTP workers are temporarily
# commented out below. Their backing services (:9000–9007) aren't running, and
# agent_core's discover_and_register currently lets an unreachable HTTP worker's
# botched cancellation cascade and cancel sibling workers' discovery (including
# frida). Re-enable them once (a) those services are up AND (b) the agent_core
# discovery-robustness fix lands. See docs/superpowers/plans for the follow-up.
workers:
  frida:
    command: pare-frida-mcp
    transport: stdio
    risk_default: high          # FLOOR during rollout — lower to medium only after the e2e gate is green
    capability_tags: [mobile, dynamic, android, frida]

  # --- apk_re_agents (Streamable HTTP) — disabled until services run + discovery hardened ---
